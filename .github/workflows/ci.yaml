name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NEXTEST_COLOR: always

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: make frontend-fmt-check
      - name: Run lint
        run: make frontend-lint
      - name: Run typecheck
        run: make typecheck
      - name: Run tests
        run: make frontend-test
      - name: Build frontend
        run: make frontend-build

  rust:
    name: Rust
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # rust-toolchain.toml
      - name: Prefer rustup proxies over preinstalled Homebrew rustup-init
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install nextest
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: nextest
      - name: Check formatting
        run: make rust-fmt-check
      - name: Run lint
        run: make rust-lint
      - name: Run tests
        run: make rust-test

  deny-check:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # rust-toolchain.toml
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-deny
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: make deny-check

  bundle:
    name: macOS bundle build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # rust-toolchain.toml
      - name: Prefer rustup proxies over preinstalled Homebrew rustup-init
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # `createUpdaterArtifacts` makes the bundler sign the .app.tar.gz, which
      # needs a private key even for a debug build. Generate a throwaway key so
      # CI exercises the exact same bundle path (targets, icons, updater
      # signing) as a release without touching the real signing secret; the
      # resulting signature is discarded. A pubkey-mismatch warning is expected
      # and harmless here.
      - name: Generate throwaway updater signing key
        run: pnpm tauri signer generate --ci -p "" -w "${RUNNER_TEMP}/updater-key"
      # Debug build: catches a broken bundle config here instead of on a tag push.
      - name: Build debug bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAURI_SIGNING_PRIVATE_KEY="$(cat "${RUNNER_TEMP}/updater-key")" \
            pnpm tauri build --debug
