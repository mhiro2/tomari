name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: macOS release
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Prefer rustup proxies over preinstalled Homebrew rustup-init
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-macos
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # The updater compares against the version baked into the bundle, so a
      # tag that doesn't match tauri.conf.json would publish a release that
      # existing installs never pick up.
      - name: Verify tag matches app version
        run: |
          version=$(jq -r .version src-tauri/tauri.conf.json)
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match tauri.conf.json version ${version}" >&2
            exit 1
          fi
      # Builds the bundles, signs the updater artifacts, and publishes a draft
      # GitHub release with the dmg, the .app.tar.gz updater archive and the
      # latest.json manifest that `tauri-plugin-updater` polls.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tomari ${{ github.ref_name }}
          releaseDraft: true
