name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NEXTEST_COLOR: always

jobs:
  # Mirrors the frontend + rust jobs from ci.yaml so a tag build never
  # publishes a release that hasn't passed fmt/lint/test. Kept as minimal,
  # self-contained jobs rather than a reusable workflow to avoid the extra
  # indirection of workflow_call for two jobs.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: make frontend-fmt-check
      - name: Run lint
        run: make frontend-lint
      - name: Run typecheck
        run: make typecheck
      - name: Run tests
        run: make frontend-test
      - name: Build frontend
        run: make frontend-build

  rust:
    name: Rust
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # rust-toolchain.toml
      - name: Prefer rustup proxies over preinstalled Homebrew rustup-init
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install nextest
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: nextest
      - name: Check formatting
        run: make rust-fmt-check
      - name: Run lint
        run: make rust-lint
      - name: Run tests
        run: make rust-test

  release:
    name: macOS release
    needs: [frontend, rust]
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # rust-toolchain.toml
      - name: Prefer rustup proxies over preinstalled Homebrew rustup-init
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # The updater compares against the version baked into the bundle, so a
      # tag that doesn't match tauri.conf.json would publish a release that
      # existing installs never pick up.
      - name: Verify tag matches app version
        run: |
          version=$(jq -r .version src-tauri/tauri.conf.json)
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match tauri.conf.json version ${version}" >&2
            exit 1
          fi
      # Builds the bundles, signs the updater artifacts, and publishes a draft
      # GitHub release with the dmg, the .app.tar.gz updater archive and the
      # latest.json manifest that `tauri-plugin-updater` polls.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Tomari ${{ github.ref_name }}
          releaseDraft: true
